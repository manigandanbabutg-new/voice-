<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translate & Speak</title>
    <!-- Google Fonts & FontAwesome for 3D-like modern icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --phone-bg: #111827;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --accent: #10b981;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-grad);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* --- COMPACT 3D MOBILE FRAME --- */
        .phone-wrapper {
            position: relative;
            width: 340px;
            height: 620px;
            background: var(--phone-bg);
            border-radius: 36px;
            padding: 10px;
            box-shadow: 
                0px 20px 40px -10px rgba(0, 0, 0, 0.7),
                inset 0 3px 5px rgba(255, 255, 255, 0.15),
                inset 0 -3px 5px rgba(0, 0, 0, 0.6);
            border: 4px solid #374151;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Phone Screen Overlay & Dynamic Notch */
        .phone-screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 100%);
            border-radius: 28px;
            overflow-y: auto;
            padding: 24px 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Hide Scrollbar for Pure App Look */
        .phone-screen::-webkit-scrollbar {
            width: 0px;
        }

        /* Compact Notch */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 20px;
            background: #000;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .notch::before {
            content: '';
            width: 30px;
            height: 3px;
            background: #222;
            border-radius: 10px;
        }

        /* --- APP CONTENT & UI --- */
        .app-header {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 18px;
        }

        /* 3D Icon Styling */
        .icon-container {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
            border-radius: 16px;
            margin-bottom: 10px;
            box-shadow: 
                0 8px 16px rgba(79, 70, 229, 0.4),
                inset 0 3px 0 rgba(255, 255, 255, 0.3),
                inset 0 -3px 0 rgba(0, 0, 0, 0.2);
            transform: perspective(100px) rotateX(10deg);
            animation: float 4s ease-in-out infinite;
        }

        .icon-container i {
            font-size: 1.5rem;
            color: #fff;
            filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.3));
        }

        h2 {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* --- FORM ELEMENTS --- */
        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 10px;
            backdrop-filter: blur(10px);
        }

        label {
            display: block;
            color: #9ca3af;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        textarea, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            color: #fff;
            padding: 8px 10px;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.3s ease;
            resize: none;
        }

        textarea:focus, select:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.2);
        }

        select {
            appearance: none;
            cursor: pointer;
        }

        /* --- 3D BUTTONS & ANIMATIONS --- */
        .btn-3d {
            position: relative;
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            border: none;
            border-radius: 14px;
            padding: 12px;
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            box-shadow: 
                0 5px 0 #1e1b4b,
                0 10px 16px rgba(79, 70, 229, 0.35);
            transform: translateY(-2px);
            transition: all 0.15s ease-out;
        }

        .btn-3d:hover {
            background: linear-gradient(135deg, #5a52e6 0%, #4338ca 100%);
            transform: translateY(-3px);
            box-shadow: 
                0 6px 0 #1e1b4b,
                0 12px 20px rgba(79, 70, 229, 0.45);
        }

        .btn-3d:active {
            transform: translateY(3px);
            box-shadow: 
                0 2px 0 #1e1b4b,
                0 3px 8px rgba(79, 70, 229, 0.25);
        }

        /* --- OUTPUT SECTIONS --- */
        .output-card {
            margin-top: 20px;
            padding: 12px;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 14px;
            box-shadow: 0 6px 24px 0 rgba(0, 0, 0, 0.2);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .output-card h3 {
            color: var(--accent);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .output-text {
            color: #f3f4f6;
            font-size: 0.85rem;
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.25);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        audio {
            width: 100%;
            border-radius: 10px;
            filter: invert(90%) hue-rotate(120deg);
            opacity: 0.9;
        }

        @keyframes float {
            0%, 100% { transform: perspective(100px) rotateX(10deg) translateY(0); }
            50% { transform: perspective(100px) rotateX(10deg) translateY(-6px); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        <style>
      * {
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      #install-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .install-card {
        width: 90%;
        max-width: 420px;
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        text-align: center;
        position: relative;
        box-shadow: 0 15px 40px rgba(0, 0, 0, .3);
      }

      .close-btn {
        position: absolute;
        top: 10px;
        right: 14px;
        border: none;
        background: transparent;
        font-size: 22px;
        cursor: pointer;
      }

      h2 {
        margin-top: 0;
      }

      .install-btn {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      .install-btn:disabled {
        opacity: .5;
        cursor: not-allowed;
      }

      .continue-btn {
        width: 100%;
        padding: 12px;
        margin-top: 18px;
        border: none;
        border-radius: 8px;
        background: #e5e7eb;
        cursor: pointer;
        font-size: 15px;
      }

      ol {
        text-align: left;
        font-size: 14px;
        padding-left: 20px;
      }

      #install-overlay-status {
        color: #666;
        margin-top: 15px;
        min-height: 18px;
        font-size: 14px;
      }

      hr {
        margin: 20px 0;
      }
    
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="notch"></div>
        <div class="phone-screen">
            
            <div class="app-header">
                <div class="icon-container">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <h2>Translate & Speak</h2>
            </div>

            <form method="POST">
                <div class="input-group">
                    <label><i class="fa-solid fa-keyboard" style="margin-right: 4px;"></i> Enter text:</label>
                    <textarea name="text" rows="3" placeholder="Type text here..." required></textarea>
                </div>

                <div class="input-group">
                    <label><i class="fa-solid fa-globe" style="margin-right: 4px;"></i> Target language:</label>
                    <div style="position: relative; display: flex; align-items: center;">
                        <select name="target">
                            {% for code, name in languages.items() %}
                                <option value="{{ code }}">{{ name }} ({{ code }})</option>
                            {% endfor %}
                        </select>
                        <i class="fa-solid fa-chevron-down" style="position: absolute; right: 10px; font-size: 0.8rem; color: #9ca3af; pointer-events: none;"></i>
                    </div>
                </div>

                <button type="submit" class="btn-3d">
                    <i class="fa-solid fa-volume-high"></i> Translate & Speak
                </button>
            </form>

            <!-- Rendered Output Cards -->
            {% if translated_text %}
                <div class="output-card">
                    <h3><i class="fa-solid fa-language"></i> Translated Text</h3>
                    <div class="output-text">{{ translated_text }}</div>

                    <h3><i class="fa-solid fa-volume-low"></i> Voice Generation</h3>
                    <audio controls autoplay>
                        <source src="/audio" type="audio/mpeg">
                    </audio>
                </div>
            {% endif %}

        </div>
    </div>

    
    <div id="root"></div>

    <!-- Install Overlay -->
    <div id="install-overlay">
      <div class="install-card">

        <button id="btn-install-dismiss" class="close-btn">✕</button>

        <h2>Install Bookverse</h2>

        <p>Install this app for a faster experience and offline support.</p>

        <button id="btn-install-app" class="install-btn" disabled>
          Install App
        </button>

        <button id="btn-continue-browser" class="continue-btn">
          Continue in Browser
        </button>

        <div id="install-overlay-status"></div>

      </div>
    </div>

    <!-- Register Service Worker -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) =>
              console.log("Bookverse Service Worker Registered:", reg.scope)
            )
            .catch((err) =>
              console.error("Service Worker Registration Failed:", err)
            );
        });
      }
    </script>

     <!-- PWA Install Logic -->
    <script>
      (() => {

        const overlay = document.getElementById("install-overlay");
        const installBtn = document.getElementById("btn-install-app");
        const statusEl = document.getElementById("install-overlay-status");
        const dismissBtn = document.getElementById("btn-install-dismiss");
        const continueBtn = document.getElementById("btn-continue-browser");

        const DISMISS_KEY = "bookverse-install-dismissed";

        let deferredPrompt = null;

        function isStandalone() {
          return (
            window.matchMedia("(display-mode: standalone)").matches ||
            window.navigator.standalone === true
          );
        }

        function showOverlay() {
          overlay.style.display = "flex";
        }

        function hideOverlay() {
          overlay.style.display = "none";
        }

        if (!isStandalone() && sessionStorage.getItem(DISMISS_KEY) !== "1") {
          showOverlay();
        }

        window.addEventListener("beforeinstallprompt", (e) => {
          e.preventDefault();
          deferredPrompt = e;
          installBtn.disabled = false;
          console.log("Install Prompt Ready");
        });

        installBtn.addEventListener("click", async () => {
          if (!deferredPrompt) {
            statusEl.innerHTML =
              "One-tap install isn't available.<br>Please use your browser menu and choose <b>Install App</b>.";
            return;
          }

          installBtn.disabled = true;
          deferredPrompt.prompt();

          const { outcome } = await deferredPrompt.userChoice;
          console.log("Install Result:", outcome);

          if (outcome === "accepted") {
            statusEl.textContent = "Installation successful.";
          } else {
            statusEl.textContent = "Installation cancelled.";
            installBtn.disabled = false;
          }

          deferredPrompt = null;
        });

        window.addEventListener("appinstalled", () => {
          console.log("PWA Installed");
          hideOverlay();
          deferredPrompt = null;
        });

        dismissBtn.addEventListener("click", () => {
          sessionStorage.setItem(DISMISS_KEY, "1");
          hideOverlay();
        });

        continueBtn.addEventListener("click", () => {
          sessionStorage.setItem(DISMISS_KEY, "1");
          hideOverlay();
        });

      })();
    </script>
  </body>
</html>

</body>
</html>
